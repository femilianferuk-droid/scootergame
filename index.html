<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vest Scoot 3D - Трюковый Самокат</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
            pointer-events: none;
        }
        .score-container {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #00ffff;
        }
        .high-score {
            font-size: 14px;
            color: #8888ff;
        }
        #combo-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #ff00ff;
            font-weight: bold;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(255,0,255,0.5);
            display: none;
        }
        #combo-bar {
            width: 100px;
            height: 6px;
            background: #220022;
            border: 1px solid #ff00ff;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        #combo-progress {
            width: 100%;
            height: 100%;
            background: #ff00ff;
        }
        #charge-bar-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #00ffff;
            border-radius: 6px;
            overflow: hidden;
            display: none;
        }
        #charge-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
        }
        #trick-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 40px;
            font-weight: italic;
            text-shadow: 0 0 20px #00ffff;
            font-weight: 900;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 20, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,255,255,0.3));
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
            margin-top: 20px;
        }
        .btn:hover {
            background: #00ffff;
            color: #050510;
            box-shadow: 0 0 25px rgba(0,255,255,0.6);
            transform: scale(1.05);
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #666688;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div class="score-container">СЧЁТ: <span id="score-val">0</span></div>
        <div class="high-score">РЕКОРД: <span id="high-val">0</span></div>
    </div>

    <div id="combo-ui">
        <div>X<span id="combo-mult">1</span></div>
        <div id="combo-bar"><div id="combo-progress"></div></div>
    </div>

    <div id="charge-bar-container">
        <div id="charge-progress"></div>
    </div>

    <div id="trick-text">TAILWHIP!</div>

    <div id="controls-hint">
        Управление: Вперед/Назад - W/S или Стрелки | Прыжок - ЗАЖАТЬ Пробел<br>
        Трюки в воздухе: W - Tailwhip | B - Barspin | F - No Footer | T - Tabletop
    </div>

    <div id="game-over-screen">
        <h1 id="go-title">РАЙДЕР УПАЛ!</h1>
        <p style="font-size: 20px; color: #8888ff;">Вы набрали: <span id="final-score" style="color: #fff; font-weight: bold;">0</span> очков</p>
        <button class="btn" onclick="resetGame()">КАТАТЬ СНОВА</button>
    </div>

    <script>
        // --- ГЛОБАЛЬНЫЕ НАСТРОЙКИ И СОСТОЯНИЕ ИГРЫ ---
        let scene, camera, renderer;
        let player, scooter, handlebars, deck, rider;
        let particles = [];
        
        // Физические параметры игрока
        const physics = {
            x: 0, y: 0.5, z: 0,
            vx: 15, vy: 0, 
            speedForward: 15,
            maxSpeed: 35,
            gravity: 38,
            isGrounded: true,
            pitch: 0, // наклон вперед/назад
            roll: 0,  // наклон влево/вправо
            jumpCharge: 0,
            isCharging: false
        };

        // Состояние трюков и очков
        let score = 0;
        let highScore = localStorage.getItem('scoot_high') || 0;
        let combo = 1;
        let comboTimer = 0;
        const maxComboTime = 3.0; 
        let activeTricks = { tailwhip: 0, barspin: 0, nofooter: 0, tabletop: 0 };
        let isGameOver = false;

        // Ввод
        const keys = {};

        // Сегменты трассы
        let segments = [];
        let segmentWidth = 20; 
        let nextSegmentZ = 0;
        const visibleSegmentsCount = 15;

        // Аудио контекст (Web Audio API)
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTrickSound(type) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'jump') {
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'land') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else { // Трюк
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Инициализация Three.js
        function init() {
            const container = document.getElementById('canvas-container');
            document.getElementById('high-val').innerText = highScore;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x03030a);
            scene.fog = new THREE.FogExp2(0x03030a, 0.008);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0x8888ff, 0.8);
            dirLight.position.set(20, 40, -20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 150;
            let d = 40;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(0x00ffff, 1, 30);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);
            physics.light = pointLight;

            // Создание игрока и самоката
            buildPlayer();

            // Генерация стартовой трассы
            for (let i = 0; i < visibleSegmentsCount; i++) {
                generateSegment();
            }

            // Слушатели клавиатуры
            window.addEventListener('keydown', e => { 
                keys[e.code] = true; 
                initAudio(); 
                handleTrickInput(e.code);
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        // --- СБОРКА МОДЕЛИ ИГРОКА (ИЕРАРХИЯ THREE.JS) ---
        function buildPlayer() {
            player = new THREE.Group();

            // Корневой меш самоката
            scooter = new THREE.Group();
            player.add(scooter);

            // Материалы с неоновым свечением (Emissive)
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2 });
            const neonBlue = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x005555, roughness: 0.1 });
            const neonPink = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0x550055, roughness: 0.1 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            // Дека (платформа)
            const deckGeo = new THREE.BoxGeometry(0.3, 0.06, 1.2);
            deck = new THREE.Mesh(deckGeo, neonPink);
            deck.castShadow = true;
            deck.position.set(0, 0.05, -0.2);
            scooter.add(deck);

            // Вилка и руль (собраны вместе для анимации Barspin)
            handlebars = new THREE.Group();
            handlebars.position.set(0, 0.05, 0.4); // Точка крепления рулевой стойки
            scooter.add(handlebars);

            const G_steer = new THREE.CylinderGeometry(0.03, 0.03, 0.9);
            const steer = new THREE.Mesh(G_steer, metalMat);
            steer.position.set(0, 0.45, 0);
            steer.rotation.x = -0.1; // небольшой наклон руля назад
            handlebars.add(steer);

            const G_bar = new THREE.CylinderGeometry(0.025, 0.025, 0.6);
            const bar = new THREE.Mesh(G_bar, neonBlue);
            bar.position.set(0, 0.9, 0);
            bar.rotation.z = Math.PI / 2;
            bar.castShadow = true;
            handlebars.add(bar);

            // Колеса
            const wheelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.08, 16);
            wheelGeo.rotateZ(Math.PI / 2);
            
            const frontWheel = new THREE.Mesh(wheelGeo, wheelMat);
            frontWheel.position.set(0, -0.05, 0.05); frontWheel.castShadow = true;
            handlebars.add(frontWheel); // फ्रंट wheel поворачивается вместе с рулем

            const backWheel = new THREE.Mesh(wheelGeo, wheelMat);
            backWheel.position.set(0, 0, -0.7); backWheel.castShadow = true;
            scooter.add(backWheel);

            // Райдер (стилизованный человечек)
            rider = new THREE.Group();
            rider.position.set(0, 0.1, -0.1);
            player.add(rider);

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const clothMat = new THREE.MeshStandardMaterial({ color: 0x222244 });

            // Торс
            const torsoGeo = new THREE.BoxGeometry(0.35, 0.5, 0.2);
            const torso = new THREE.Mesh(torsoGeo, clothMat);
            torso.position.y = 0.5; torso.castShadow = true;
            rider.add(torso);

            // Голова / Шлем
            const headGeo = new THREE.SphereGeometry(0.14, 16, 16);
            const head = new THREE.Mesh(headGeo, neonBlue);
            head.position.y = 0.82; head.castShadow = true;
            rider.add(head);

            // Ноги (схематично)
            const legGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
            const leftLeg = new THREE.Mesh(legGeo, bodyMat);
            leftLeg.position.set(-0.1, 0.2, 0); leftLeg.castShadow = true;
            rider.add(leftLeg);
            physics.leftLeg = leftLeg;

            const rightLeg = new THREE.Mesh(legGeo, bodyMat);
            rightLeg.position.set(0.1, 0.2, 0); rightLeg.castShadow = true;
            rider.add(rightLeg);
            physics.rightLeg = rightLeg;

            scene.add(player);
        }

        // --- ГЕНЕРАЦИЯ ТРАССЫ ---
        function generateSegment() {
            let type = 'straight';
            
            // Первые 3 сегмента всегда прямые
            if (nextSegmentZ < -40) {
                let r = Math.random();
                if (r < 0.35) type = 'ramp';      // Трамплин
                else if (r < 0.55) type = 'box';  // Фанбокс/Препятствие
                else if (r < 0.65) type = 'bump'; // Кочка
            }

            const segGroup = new THREE.Group();
            segGroup.userData = { type: type, zStart: nextSegmentZ, zEnd: nextSegmentZ - segmentWidth };

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x0f1020, roughness: 0.7 });
            const borderMat = new THREE.MeshStandardMaterial({ color: 0x3d0066, emissive: 0x1a0033 });

            // Базовая плита дороги
            const baseGeo = new THREE.BoxGeometry(8, 0.5, segmentWidth);
            const base = new THREE.Mesh(baseGeo, roadMat);
            base.position.set(0, -0.25, nextSegmentZ - segmentWidth / 2);
            base.receiveShadow = true;
            segGroup.add(base);

            // Неоновые отбойники по бокам
            const sideGeo = new THREE.BoxGeometry(0.3, 0.4, segmentWidth);
            const leftSide = new THREE.Mesh(sideGeo, borderMat);
            leftSide.position.set(-4.1, 0.1, nextSegmentZ - segmentWidth / 2);
            const rightSide = leftSide.clone();
            rightSide.position.x = 4.1;
            segGroup.add(leftSide);
            segGroup.add(rightSide);

            // Добавление фигур в зависимости от типа
            if (type === 'ramp') {
                const rampLength = 6;
                const rampHeight = 1.8;
                const rampGeo = new THREE.BufferGeometry();
                
                // Вершины для клина (рампы)
                const w = 4; // Ширина
                const vertices = new Float32Array([
                    -w/2, 0, 0,
                     w/2, 0, 0,
                     w/2, rampHeight, -rampLength,
                    -w/2, rampHeight, -rampLength,
                    -w/2, 0, -rampLength,
                     w/2, 0, -rampLength
                ]);
                const indices = [
                    0, 2, 1,  0, 3, 2, // Наклонная плоскость
                    4, 1, 5,  4, 0, 1, // Низ
                    3, 5, 2,  3, 4, 5, // Задняя стенка
                    0, 4, 3,           // Левый бок
                    1, 2, 5            // Правый бок
                ];
                rampGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                rampGeo.setIndex(indices);
                rampGeo.computeVertexNormals();

                const rampMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.4, side: THREE.DoubleSide });
                const ramp = new THREE.Mesh(rampGeo, rampMat);
                // Размещаем в центре сегмента
                ramp.position.set(0, 0, nextSegmentZ - segmentWidth / 2 + rampLength/2);
                ramp.castShadow = true;
                ramp.receiveShadow = true;
                segGroup.add(ramp);

                // Записываем параметры коллизии для рампы
                segGroup.userData.ramp = {
                    zStart: ramp.position.z,
                    zEnd: ramp.position.z - rampLength,
                    height: rampHeight,
                    length: rampLength
                };
            } 
            else if (type === 'box') {
                const boxGeo = new THREE.BoxGeometry(3, 0.8, 5);
                const boxMat = new THREE.MeshStandardMaterial({ color: 0xff00ff, roughness: 0.5 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(Math.random() * 2 - 1, 0.4, nextSegmentZ - segmentWidth / 2);
                box.castShadow = true;
                box.receiveShadow = true;
                segGroup.add(box);

                segGroup.userData.box = {
                    xMin: box.position.x - 1.5, xMax: box.position.x + 1.5,
                    zStart: box.position.z + 2.5, zEnd: box.position.z - 2.5,
                    height: 0.8
                };
            }

            scene.add(segGroup);
            segments.push(segGroup);
            nextSegmentZ -= segmentWidth;
        }

        // --- ОБРАБОТКА ВВОДА ДЛЯ ТРЮКОВ ---
        function handleTrickInput(code) {
            if (physics.isGrounded || isGameOver) return;

            if (code === 'KeyW' && !activeTricks.tailwhip) {
                activeTricks.tailwhip = 1; playTrickSound('trick');
                showTrickText('TAILWHIP!', 300);
            }
            if (code === 'KeyB' && !activeTricks.barspin) {
                activeTricks.barspin = 1; playTrickSound('trick');
                showTrickText('BARSPIN!', 250);
            }
            if (code === 'KeyF' && !activeTricks.nofooter) {
                activeTricks.nofooter = 1; playTrickSound('trick');
                showTrickText('NO FOOTER!', 400);
            }
            if (code === 'KeyT' && !activeTricks.tabletop) {
                activeTricks.tabletop = 1; playTrickSound('trick');
                showTrickText('TABLETOP!', 350);
            }
        }

        function showTrickText(text, points) {
            const el = document.getElementById('trick-text');
            el.innerText = text;
            el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 600);

            // Начисление очков
            comboTimer = maxComboTime;
            score += Math.floor(points * combo);
            document.getElementById('score-val').innerText = score;
            
            combo += 0.5;
            document.getElementById('combo-mult').innerText = combo.toFixed(1);
            document.getElementById('combo-ui').style.display = 'block';
        }

        // --- ДИНАМИЧЕСКИЙ ФИЗИЧЕСКИЙ ДВИЖОК ---
        function updatePhysics(dt) {
            if (isGameOver) return;

            // Движение вперед с постоянным разгоном
            if (physics.vx < physics.maxSpeed) {
                physics.vx += 3 * dt; 
            }
            physics.z -= physics.vx * dt;
            physics.light.position.set(physics.x, physics.y + 4, physics.z);

            // Смещение по горизонтали (A/D или стрелки)
            if (keys['KeyA'] || keys['ArrowLeft']) physics.x -= 7 * dt;
            if (keys['KeyD'] || keys['ArrowRight']) physics.x += 7 * dt;
            // Ограничение по ширине дороги
            physics.x = Math.max(-3.7, Math.min(3.7, physics.x));

            // Логика прыжка (Зажатие Пробела)
            if (keys['Space'] && physics.isGrounded) {
                physics.isCharging = true;
                physics.jumpCharge = Math.min(1.0, physics.jumpCharge + 1.8 * dt);
                document.getElementById('charge-bar-container').style.display = 'block';
                document.getElementById('charge-progress').style.width = (physics.jumpCharge * 100) + '%';
            } else {
                if (physics.isCharging && physics.isGrounded) {
                    // Сила прыжка зависит от удержания кнопки
                    physics.vy = 8 + (physics.jumpCharge * 12);
                    physics.isGrounded = false;
                    physics.isCharging = false;
                    physics.jumpCharge = 0;
                    document.getElementById('charge-bar-container').style.display = 'none';
                    playTrickSound('jump');
                    spawnParticles(15, 0x00ffff);
                }
            }

            // Гравитация и расчет высоты пола (коллизии)
            let targetFloorY = 0;
            let currentSegment = null;

            // Находим сегмент, на котором находится игрок
            for (let seg of segments) {
                if (physics.z <= seg.userData.zStart && physics.z >= seg.userData.zEnd) {
                    currentSegment = seg;
                    break;
                }
            }

            if (currentSegment) {
                // Проверка коллизии с Рампой
                if (currentSegment.userData.type === 'ramp' && currentSegment.userData.ramp) {
                    let r = currentSegment.userData.ramp;
                    if (physics.z <= r.zStart && physics.z >= r.zEnd) {
                        let pct = (r.zStart - physics.z) / (r.zStart - r.zEnd);
                        targetFloorY = pct * r.height;
                    }
                }
                // Проверка коллизии с Коробкой (Box)
                else if (currentSegment.userData.type === 'box' && currentSegment.userData.box) {
                    let b = currentSegment.userData.box;
                    if (physics.z <= b.zStart && physics.z >= b.zEnd && physics.x >= b.xMin && physics.x <= b.xMax) {
                        targetFloorY = b.height;
                    }
                }
            }

            // Воздушная фаза или езда
            if (!physics.isGrounded) {
                physics.vy -= physics.gravity * dt;
                physics.y += physics.vy * dt;

                // Наклон в воздухе для стиля / баланса
                if (keys['KeyA'] || keys['ArrowLeft']) physics.roll = Math.max(-0.6, physics.roll - 3 * dt);
                if (keys['KeyD'] || keys['ArrowRight']) physics.roll = Math.min(0.6, physics.roll + 3 * dt);

                // Приземление
                if (physics.y <= targetFloorY) {
                    physics.y = targetFloorY;
                    physics.vy = 0;
                    physics.isGrounded = true;
                    playTrickSound('land');
                    spawnParticles(8, 0xff00ff);
                    
                    // Проверка критического угла приземления (КРАШ!)
                    if (Math.abs(physics.roll) > 0.4 || Math.abs(physics.pitch) > 0.4) {
                        endGame();
                    }
                    
                    physics.roll = 0; 
                    physics.pitch = 0;
                }
            } else {
                // Игрок на земле плавно адаптируется к высоте препятствия
                if (physics.y < targetFloorY) {
                    // Если заехали на рампу на скорости - плавно поднимаемся
                    physics.y = targetFloorY;
                } else if (physics.y > targetFloorY + 0.05) {
                    // Слет со стола/рампы (дроп)
                    physics.isGrounded = false;
                }
                
                // Легкий наклон от скорости поворота
                if (keys['KeyA'] || keys['ArrowLeft']) physics.roll = -0.15;
                else if (keys['KeyD'] || keys['ArrowRight']) physics.roll = 0.15;
                else physics.roll = 0;
            }

            // Обновление положения мастер-группы игрока
            player.position.set(physics.x, physics.y, physics.z);
            player.rotation.z = -physics.roll;
            player.rotation.x = physics.pitch;

            // Бесконечный менеджмент сегментов трассы
            if (segments.length > 0 && segments[0].userData.zStart < physics.z + 30) {
                let oldSeg = segments.shift();
                scene.remove(oldSeg);
                generateSegment();
            }

            // Таймер комбо
            if (combo > 1) {
                comboTimer -= dt;
                document.getElementById('combo-progress').style.width = (comboTimer / maxComboTime * 100) + '%';
                if (comboTimer <= 0) {
                    combo = 1;
                    document.getElementById('combo-ui').style.display = 'none';
                }
            }
        }

        // --- СИСТЕМА АНИМАЦИЙ (ТРЮКИ И ЭФФЕКТЫ) ---
        function animateTricks(dt) {
            // 1. Tailwhip (Вращение деки вокруг оси Y)
            if (activeTricks.tailwhip > 0) {
                activeTricks.tailwhip += 8 * dt;
                deck.rotation.y = activeTricks.tailwhip * Math.PI;
                if (activeTricks.tailwhip >= 3) { // 1 полный оборот
                    activeTricks.tailwhip = 0;
                    deck.rotation.y = 0;
                }
            }

            // 2. Barspin (Вращение руля на 360 градусов)
            if (activeTricks.barspin > 0) {
                activeTricks.barspin += 10 * dt;
                handlebars.rotation.y = activeTricks.barspin * Math.PI;
                if (activeTricks.barspin >= 3) {
                    activeTricks.barspin = 0;
                    handlebars.rotation.y = 0;
                }
            }

            // 3. No Footer (Райдер раскидывает ноги в стороны)
            if (activeTricks.nofooter > 0) {
                activeTricks.nofooter += 5 * dt;
                let phase = Math.sin(activeTricks.nofooter * Math.PI);
                physics.leftLeg.position.x = -0.1 - (phase * 0.4);
                physics.rightLeg.position.x = 0.1 + (phase * 0.4);
                if (activeTricks.nofooter >= 1.5) {
                    activeTricks.nofooter = 0;
                    physics.leftLeg.position.x = -0.1;
                    physics.rightLeg.position.x = 0.1;
                }
            }

            // 4. Tabletop (Наклон самоката на бок в воздухе)
            if (activeTricks.tabletop > 0) {
                activeTricks.tabletop += 6 * dt;
                let phase = Math.sin(activeTricks.tabletop * Math.PI);
                scooter.rotation.z = phase * 1.1;
                rider.rotation.z = -phase * 0.4; // тело компенсирует наклон
                if (activeTricks.tabletop >= 1.5) {
                    activeTricks.tabletop = 0;
                    scooter.rotation.z = 0;
                    rider.rotation.z = 0;
                }
            }
        }

        // --- СИСТЕМА ЧАСТИЦ (ПАРТИКЛЫ) ---
        function spawnParticles(count, colorHex) {
            const pGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
            const pMat = new THREE.MeshBasicMaterial({ color: colorHex });
            
            for(let i=0; i<count; i++) {
                const mesh = new THREE.Mesh(pGeo, pMat);
                mesh.position.set(physics.x + (Math.random()*0.2-0.1), physics.y, physics.z - 0.5);
                scene.add(mesh);
                particles.push({
                    mesh: mesh,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 6 + 2,
                    vz: physics.vx * 0.3 + Math.random() * 4,
                    life: 1.0
                });
            }
        }

        function updateParticles(dt) {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= dt * 2.0;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.vy -= 12 * dt; // гравитация частиц
                
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        // --- КОНЕЦ ИГРЫ И НАСТРОЙКА РЕСТАРТА ---
        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').classList.add('active');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('scoot_high', highScore);
                document.getElementById('high-val').innerText = highScore;
                document.getElementById('go-title').innerText = "НОВЫЙ РЕКОРД!";
            } else {
                document.getElementById('go-title').innerText = "РАЙДЕР УПАЛ!";
            }
        }

        function resetGame() {
            // Очистка старой трассы
            for (let seg of segments) scene.remove(seg);
            segments = [];
            nextSegmentZ = 0;

            // Сброс физики
            physics.x = 0; physics.y = 0.5; physics.z = 0;
            physics.vx = 15; physics.vy = 0;
            physics.pitch = 0; physics.roll = 0;
            physics.isGrounded = true;
            physics.isCharging = false; physics.jumpCharge = 0;

            // Сброс очков
            score = 0; combo = 1;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('combo-ui').style.display = 'none';
            document.getElementById('charge-bar-container').style.display = 'none';

            // Генерация заново
            for (let i = 0; i < visibleSegmentsCount; i++) generateSegment();

            isGameOver = false;
            document.getElementById('game-over-screen').classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.1) dt = 0.1; // защита от лагов в фоне

            updatePhysics(dt);
            animateTricks(dt);
            updateParticles(dt);

            // Динамическое следование камеры за игроком (Плавный Lerp)
            if (!isGameOver) {
                const targetCamX = physics.x * 0.6;
                const targetCamY = physics.y + 3.2;
                const targetCamZ = physics.z + 5.5; // Сзади от игрока
                
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                camera.position.y += (targetCamY - camera.position.y) * 0.1;
                camera.position.z += (targetCamZ - camera.position.z) * 0.1;
                
                camera.lookAt(new THREE.Vector3(physics.x, physics.y + 0.5, physics.z - 2));
            }

            renderer.render(scene, camera);
        }

        // Старт игры при загрузке страницы
        window.onload = init;
    </script>
</body>
</html>
