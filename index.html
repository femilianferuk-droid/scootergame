<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scooter Street Park 3D (Offline)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #08080f;
            font-family: 'Permanent Marker', cursive, sans-serif;
            user-select: none;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            z-index: 10;
            pointer-events: none;
        }
        .score-container {
            font-size: 28px;
            letter-spacing: 2px;
            color: #ffcc00;
            text-shadow: 2px 2px 0px #000;
        }
        .high-score {
            font-size: 16px;
            color: #00ffcc;
            text-shadow: 1px 1px 0px #000;
        }
        #combo-ui {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            color: #ff0055;
            font-size: 32px;
            z-index: 10;
            text-shadow: 2px 2px 0px #000;
            display: none;
        }
        #combo-bar {
            width: 120px;
            height: 8px;
            background: #200010;
            border: 2px solid #ff0055;
            margin-top: 5px;
            border-radius: 4px;
            overflow: hidden;
        }
        #combo-progress {
            width: 100%;
            height: 100%;
            background: #ff0055;
        }
        #charge-bar-container {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 14px;
            background: #111;
            border: 3px solid #ffcc00;
            border-radius: 7px;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        #charge-progress {
            width: 0%;
            height: 100%;
            background: #ffcc00;
        }
        #trick-text {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 45px;
            text-shadow: 3px 3px 0px #000, 0 0 20px #ff0055;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 3px;
        }
        
        /* Мобильный интерфейс */
        #touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        .touch-zone {
            pointer-events: auto;
            position: absolute;
        }
        #joystick-zone {
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 3px dashed rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        #joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.4);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            left: 35px;
        }
        #action-zone {
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 140px;
        }
        .btn-touch {
            background: rgba(255, 0, 85, 0.4);
            border: 2px solid #ff0055;
            color: white;
            font-family: 'Permanent Marker', cursive;
            border-radius: 50%;
            position: absolute;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-touch:active {
            background: #ff0055;
            transform: scale(0.9);
        }
        #btn-jump { width: 65px; height: 65px; bottom: 0; right: 0; background: rgba(255,204,0,0.4); border-color: #ffcc00; font-size: 14px; color: black; }
        #btn-whip { width: 45px; height: 45px; top: 0; right: 10px; }
        #btn-bar { width: 45px; height: 45px; top: 20px; left: 10px; }
        #btn-foot { width: 45px; height: 45px; bottom: 55px; left: 0; }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 5, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 100;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 55px;
            margin-bottom: 5px;
            color: #ff0055;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 3px;
        }
        .btn-restart {
            padding: 12px 35px;
            font-size: 22px;
            background: #ffcc00;
            color: #000;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #ff0055;
            cursor: pointer;
            font-family: 'Permanent Marker', cursive;
            transition: transform 0.1s;
            margin-top: 25px;
        }
        .btn-restart:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ff0055;
        }
    </style>
    
    <script>

<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div class="score-container">SCORE: <span id="score-val">0</span></div>
        <div class="high-score">BEST: <span id="high-val">0</span></div>
    </div>

    <div id="combo-ui">
        <div>X<span id="combo-mult">1</span></div>
        <div id="combo-bar"><div id="combo-progress"></div></div>
    </div>

    <div id="charge-bar-container">
        <div id="charge-progress"></div>
    </div>

    <div id="trick-text">TAILWHIP</div>

    <div id="touch-controls">
        <div id="joystick-zone" class="touch-zone">
            <div id="joystick-stick"></div>
        </div>
        <div id="action-zone" class="touch-zone">
            <div id="btn-jump" class="btn-touch">JUMP</div>
            <div id="btn-whip" class="btn-touch">WHIP</div>
            <div id="btn-bar" class="btn-touch">BAR</div>
            <div id="btn-foot" class="btn-touch">FOOT</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="go-title">CRASHED!</h1>
        <p style="font-size: 24px; color: #00ffcc; text-shadow: 1px 1px 0px #000;">SCORE: <span id="final-score" style="color: #fff;">0</span></p>
        <button class="btn-restart" onclick="resetGame()">RIDE AGAIN</button>
    </div>

    <script>
        // Инициализация графики (Кастомный сверхлёгкий Canvas-движок, если WebGL падает)
        let scene, camera, renderer;
        let player, scooter, handlebars, deck, wheels = [];
        let particles = [];
        
        const physics = {
            x: 0, y: 0.6, z: 0,
            vx: 18, vy: 0, 
            speedForward: 18,
            maxSpeed: 38,
            gravity: 42,
            isGrounded: true,
            pitch: 0, roll: 0,
            jumpCharge: 0, isCharging: false,
            sideInput: 0
        };

        let score = 0;
        let highScore = localStorage.getItem('scoot_street_high') || 0;
        let combo = 1;
        let comboTimer = 0;
        const maxComboTime = 2.5; 
        let activeTricks = { tailwhip: 0, barspin: 0, nofooter: 0 };
        let isGameOver = false;

        const keys = {};
        let segments = [];
        let segmentWidth = 25; 
        let nextSegmentZ = 0;
        const visibleSegmentsCount = 10;

        function checkTouchDevice() {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('touch-controls').style.display = 'block';
                setupMobileControls();
            }
        }

        // --- ЗАМЕНА СЦЕНЫ НА ЧИСТЫЙ ПРОЦЕДУРНЫЙ 2.5D CANVAS ДЛЯ 100% АВТОНОМНОСТИ ---
        function initFallbackEngine() {
            const container = document.getElementById('canvas-container');
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            document.getElementById('high-val').innerText = highScore;

            window.addEventListener('keydown', e => { keys[e.code] = true; handleTrickInput(e.code); });
            window.addEventListener('keyup', e => { keys[e.code] = false; });
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

            // Генерация сегментов для логики коллизий
            for (let i = 0; i < 20; i++) {
                let type = 'straight';
                if (i > 2) {
                    let r = Math.random();
                    if (r < 0.4) type = 'ramp';
                    else if (r < 0.7) type = 'box';
                }
                segments.push({ type: type, zStart: -i*segmentWidth, zEnd: -(i+1)*segmentWidth, height: type==='ramp'?2.2:0.9 });
            }

            checkTouchDevice();

            // Главный цикл рендеринга на Canvas
            let lastTime = performance.now();
            function loop() {
                requestAnimationFrame(loop);
                let now = performance.now();
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;

                updateGamePhysics(dt);

                // Очистка экрана
                ctx.fillStyle = '#12101b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Рисуем красивое небо с закатом
                let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#150d2a');
                gradient.addColorStop(0.5, '#2e114d');
                gradient.addColorStop(1, '#100b1e');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Отрисовка уличных рамп скейтпарка
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2 + 100);

                // Сетка дорожного покрытия и препятствий
                let pz = physics.z;
                ctx.strokeStyle = '#ff0055';
                ctx.lineWidth = 2;

                // Деревянный пол парка
                ctx.fillStyle = '#bc8f5f';
                ctx.beginPath();
                ctx.moveTo(-250, 150);
                ctx.lineTo(250, 150);
                ctx.lineTo(180, -100);
                ctx.lineTo(-180, -100);
                ctx.closePath();
                ctx.fill();

                // Отрисовка рамп
                ctx.fillStyle = '#5c4033';
                let offsetZ = (physics.z % segmentWidth);
                
                // Простая 3D-проекция для деревянной рампы
                ctx.fillStyle = '#a07040';
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 4;
                
                let rx = physics.x * -40;
                let ry = 100 - (physics.y * 80);

                // Отрисовка кастомного самоката и райдера
                ctx.save();
                ctx.translate(rx, ry);
                ctx.rotate(-physics.roll);

                // Шкурка деки
                ctx.fillStyle = '#1c1c1c';
                ctx.fillRect(-35, -5, 70, 10);
                ctx.fillStyle = '#ff0055'; // колеса
                ctx.beginPath(); ctx.arc(-30, 10, 8, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(30, 10, 8, 0, Math.PI*2); ctx.fill();

                // Т-образный руль рулевой стойки
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(25, -5); ctx.lineTo(25, -65); ctx.stroke();
                // Грипсы руля
                ctx.strokeStyle = '#00ffcc';
                ctx.beginPath(); ctx.moveTo(5, -65); ctx.lineTo(45, -65); ctx.stroke();

                // Анимация трюков (визуальные эффекты)
                if(activeTricks.tailwhip > 0) {
                    ctx.fillStyle = '#00ffcc';
                    ctx.font = '20px "Permanent Marker"';
                    ctx.fillText("✨ SPIN ✨", -40, -90);
                }

                // Райдер (Худи и кепка)
                ctx.fillStyle = '#111111'; // торс
                ctx.fillRect(-15, -50, 30, 40);
                ctx.fillStyle = '#eeeeee'; // голова
                ctx.beginPath(); ctx.arc(0, -58, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#00ffcc'; // кепка
                ctx.fillRect(-8, -68, 20, 6);

                ctx.restore();
                ctx.restore();
            }
            loop();
        }

        // --- ФИЗИЧЕСКИЙ СЛОЙ ЛОГИКИ ---
        function updateGamePhysics(dt) {
            if (isGameOver) return;

            if (physics.vx < physics.maxSpeed) physics.vx += 4.5 * dt;
            physics.z -= physics.vx * dt;

            let currentSideMove = 0;
            if (keys['KeyA'] || keys['ArrowLeft']) currentSideMove = -1;
            if (keys['KeyD'] || keys['ArrowRight']) currentSideMove = 1;
            if (physics.sideInput !== 0) currentSideMove = physics.sideInput;

            physics.x += currentSideMove * 8 * dt;
            physics.x = Math.max(-4.5, Math.min(4.5, physics.x));

            if (keys['Space'] && physics.isGrounded) physics.isCharging = true;

            if (physics.isCharging) {
                physics.jumpCharge = Math.min(1.0, physics.jumpCharge + 2.0 * dt);
                document.getElementById('charge-bar-container').style.display = 'block';
                document.getElementById('charge-progress').style.width = (physics.jumpCharge * 100) + '%';
            }

            if (keys['Space'] === false && physics.isCharging && physics.isGrounded) {
                physics.vy = 9 + (physics.jumpCharge * 13);
                physics.isGrounded = false;
                physics.isCharging = false;
                physics.jumpCharge = 0;
                document.getElementById('charge-bar-container').style.display = 'none';
            }

            // Упрощенная проверка трека
            let targetFloorY = 0;
            let currentMod = Math.abs(physics.z) % 70;
            if (currentMod > 25 && currentMod < 45) {
                // Заезд на фанерный фанбокс или рампу
                targetFloorY = ((currentMod - 25) / 20) * 2.2;
                if (targetFloorY > 2.2) targetFloorY = 2.2;
            }

            if (!physics.isGrounded) {
                physics.vy -= physics.gravity * dt;
                physics.y += physics.vy * dt;
                physics.roll += currentSideMove * 2.2 * dt;

                if (physics.y <= targetFloorY) {
                    physics.y = targetFloorY;
                    physics.vy = 0;
                    physics.isGrounded = true;

                    if (Math.abs(physics.roll) > 0.45) endGame();
                    physics.roll = 0;
                }
            } else {
                if (physics.y < targetFloorY) physics.y = targetFloorY;
                else if (physics.y > targetFloorY + 0.08) physics.isGrounded = false;

                physics.roll = currentSideMove !== 0 ? currentSideMove * 0.18 : 0;
            }

            // Обработка трюков
            if (activeTricks.tailwhip > 0) {
                activeTricks.tailwhip += 8 * dt;
                if (activeTricks.tailwhip >= 3) activeTricks.tailwhip = 0;
            }
            if (activeTricks.barspin > 0) {
                activeTricks.barspin += 8 * dt;
                if (activeTricks.barspin >= 3) activeTricks.barspin = 0;
            }
            if (activeTricks.nofooter > 0) {
                activeTricks.nofooter += 8 * dt;
                if (activeTricks.nofooter >= 3) activeTricks.nofooter = 0;
            }

            if (combo > 1) {
                comboTimer -= dt;
                document.getElementById('combo-progress').style.width = (comboTimer / maxComboTime * 100) + '%';
                if (comboTimer <= 0) { combo = 1; document.getElementById('combo-ui').style.display = 'none'; }
            }
        }

        // --- МОБИЛЬНОЕ ТАЧ-УПРАВЛЕНИЕ ---
        function setupMobileControls() {
            const joystickZone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            let joystickActive = false;
            let startTouchX = 0;

            joystickZone.addEventListener('touchstart', e => { joystickActive = true; startTouchX = e.touches[0].clientX; });
            joystickZone.addEventListener('touchmove', e => {
                if (!joystickActive) return;
                let deltaX = e.touches[0].clientX - startTouchX;
                deltaX = Math.max(-35, Math.min(35, deltaX));
                stick.style.transform = `translateX(${deltaX}px)`;
                physics.sideInput = deltaX / 35;
            });

            const endJoystick = () => { joystickActive = false; stick.style.transform = 'translateX(0px)'; physics.sideInput = 0; };
            joystickZone.addEventListener('touchend', endJoystick);

            const btnJump = document.getElementById('btn-jump');
            btnJump.addEventListener('touchstart', () => { if (physics.isGrounded) physics.isCharging = true; });
            btnJump.addEventListener('touchend', () => {
                if (physics.isCharging && physics.isGrounded) {
                    physics.vy = 9 + (physics.jumpCharge * 13);
                    physics.isGrounded = false; physics.isCharging = false; physics.jumpCharge = 0;
                    document.getElementById('charge-bar-container').style.display = 'none';
                }
            });

            document.getElementById('btn-whip').addEventListener('touchstart', () => triggerMobileTrick('tailwhip'));
            document.getElementById('btn-bar').addEventListener('touchstart', () => triggerMobileTrick('barspin'));
            document.getElementById('btn-foot').addEventListener('touchstart', () => triggerMobileTrick('nofooter'));
        }

        function triggerMobileTrick(trickName) {
            if (physics.isGrounded || isGameOver || activeTricks[trickName]) return;
            activeTricks[trickName] = 1;
            showTrickText(trickName.toUpperCase(), 300);
        }

        function handleTrickInput(code) {
            if (physics.isGrounded || isGameOver) return;
            if (code === 'KeyW' && !activeTricks.tailwhip) { activeTricks.tailwhip = 1; showTrickText('TAILWHIP', 350); }
            if (code === 'KeyB' && !activeTricks.barspin) { activeTricks.barspin = 1; showTrickText('BARSPIN', 250); }
            if (code === 'KeyF' && !activeTricks.nofooter) { activeTricks.nofooter = 1; showTrickText('NO FOOTER', 400); }
        }

        function showTrickText(text, pts) {
            const el = document.getElementById('trick-text');
            el.innerText = text; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 600);

            comboTimer = maxComboTime;
            score += Math.floor(pts * combo);
            document.getElementById('score-val').innerText = score;
            combo += 0.5;
            document.getElementById('combo-mult').innerText = combo.toFixed(1);
            document.getElementById('combo-ui').style.display = 'block';
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').classList.add('active');
            if (score > highScore) {
                highScore = score; localStorage.setItem('scoot_street_high', highScore);
                document.getElementById('high-val').innerText = highScore;
            }
        }

        function resetGame() {
            physics.x = 0; physics.y = 0.6; physics.z = 0; physics.vx = 18; physics.vy = 0;
            score = 0; combo = 1; isGameOver = false;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over-screen').classList.remove('active');
        }

        window.onload = initFallbackEngine;
    </script>
