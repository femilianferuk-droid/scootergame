<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scooter Street Park 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #08080f;
            font-family: 'Permanent Marker', cursive, sans-serif;
            user-select: none;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            z-index: 10;
            pointer-events: none;
        }
        .score-container {
            font-size: 28px;
            letter-spacing: 2px;
            color: #ffcc00;
            text-shadow: 2px 2px 0px #000;
        }
        .high-score {
            font-size: 16px;
            color: #00ffcc;
            text-shadow: 1px 1px 0px #000;
        }
        #combo-ui {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            color: #ff0055;
            font-size: 32px;
            z-index: 10;
            text-shadow: 2px 2px 0px #000;
            display: none;
        }
        #combo-bar {
            width: 120px;
            height: 8px;
            background: #200010;
            border: 2px solid #ff0055;
            margin-top: 5px;
            border-radius: 4px;
            overflow: hidden;
        }
        #combo-progress {
            width: 100%;
            height: 100%;
            background: #ff0055;
        }
        #charge-bar-container {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 14px;
            background: #111;
            border: 3px solid #ffcc00;
            border-radius: 7px;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        #charge-progress {
            width: 0%;
            height: 100%;
            background: #ffcc00;
        }
        #trick-text {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 45px;
            text-shadow: 3px 3px 0px #000, 0 0 20px #ff0055;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 3px;
        }
        
        /* Мобильный интерфейс управления */
        #touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: none; /* Включается скриптом при таче */
        }
        .touch-zone {
            pointer-events: auto;
            position: absolute;
        }
        #joystick-zone {
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 3px dashed rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        #joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.4);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            left: 35px;
        }
        #action-zone {
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 140px;
        }
        .btn-touch {
            background: rgba(255, 0, 85, 0.4);
            border: 2px solid #ff0055;
            color: white;
            font-family: 'Permanent Marker', cursive;
            border-radius: 50%;
            position: absolute;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-touch:active {
            background: #ff0055;
            transform: scale(0.9);
        }
        #btn-jump { width: 65px; height: 65px; bottom: 0; right: 0; background: rgba(255,204,0,0.4); border-color: #ffcc00; font-size: 14px; color: black; }
        #btn-whip { width: 45px; height: 45px; top: 0; right: 10px; }
        #btn-bar { width: 45px; height: 45px; top: 20px; left: 10px; }
        #btn-foot { width: 45px; height: 45px; bottom: 55px; left: 0; }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 5, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 100;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 55px;
            margin-bottom: 5px;
            color: #ff0055;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 3px;
        }
        .btn-restart {
            padding: 12px 35px;
            font-size: 22px;
            background: #ffcc00;
            color: #000;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #ff0055;
            cursor: pointer;
            font-family: 'Permanent Marker', cursive;
            transition: transform 0.1s;
            margin-top: 25px;
        }
        .btn-restart:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ff0055;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div class="score-container">SCORE: <span id="score-val">0</span></div>
        <div class="high-score">BEST: <span id="high-val">0</span></div>
    </div>

    <div id="combo-ui">
        <div>X<span id="combo-mult">1</span></div>
        <div id="combo-bar"><div id="combo-progress"></div></div>
    </div>

    <div id="charge-bar-container">
        <div id="charge-progress"></div>
    </div>

    <div id="trick-text">TAILWHIP</div>

    <div id="touch-controls">
        <div id="joystick-zone" class="touch-zone">
            <div id="joystick-stick"></div>
        </div>
        <div id="action-zone" class="touch-zone">
            <div id="btn-jump" class="btn-touch">JUMP</div>
            <div id="btn-whip" class="btn-touch">WHIP</div>
            <div id="btn-bar" class="btn-touch">BAR</div>
            <div id="btn-foot" class="btn-touch">FOOT</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="go-title">CRASHED!</h1>
        <p style="font-size: 24px; color: #00ffcc; text-shadow: 1px 1px 0px #000;">SCORE: <span id="final-score" style="color: #fff;">0</span></p>
        <button class="btn-restart" onclick="resetGame()">RIDE AGAIN</button>
    </div>

    <script>
        // --- СОСТОЯНИЕ И НАСТРОЙКИ ИГРЫ ---
        let scene, camera, renderer;
        let player, scooter, handlebars, deck, fork, wheels = [];
        let particles = [];
        
        const physics = {
            x: 0, y: 0.6, z: 0,
            vx: 18, vy: 0, 
            speedForward: 18,
            maxSpeed: 38,
            gravity: 42,
            isGrounded: true,
            pitch: 0, roll: 0,
            jumpCharge: 0, isCharging: false,
            sideInput: 0
        };

        let score = 0;
        let highScore = localStorage.getItem('scoot_street_high') || 0;
        let combo = 1;
        let comboTimer = 0;
        const maxComboTime = 2.5; 
        let activeTricks = { tailwhip: 0, barspin: 0, nofooter: 0 };
        let isGameOver = false;

        const keys = {};
        let segments = [];
        let segmentWidth = 25; 
        let nextSegmentZ = 0;
        const visibleSegmentsCount = 10;

        // Инициализация мобильного интерфейса
        function checkTouchDevice() {
            if ('造型' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('touch-controls').style.display = 'block';
                setupMobileControls();
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ ТРЁХМЕРНОЙ СЦЕНЫ ---
        function init() {
            const container = document.getElementById('canvas-container');
            document.getElementById('high-val').innerText = highScore;

            scene = new THREE.Scene();
            // Мягкое уличное освещение заката/вечера
            scene.background = new THREE.Color(0x12101b);
            scene.fog = new THREE.FogExp2(0x12101b, 0.007);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Свет в скейтпарке
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffaa66, 0.7);
            sunLight.position.set(30, 50, 20);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 200;
            let d = 50;
            sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
            scene.add(sunLight);

            // Точечный прожектор, следующий за игроком
            const followLight = new THREE.PointLight(0x00ffff, 0.8, 40);
            scene.add(followLight);
            physics.light = followLight;

            // Небо
            createSky();

            // Создание детализированного кастомного самоката
            buildProScooter();

            // Старт парка
            for (let i = 0; i < visibleSegmentsCount; i++) {
                generateSegment();
            }

            // Обработка ввода (ПК)
            window.addEventListener('keydown', e => { 
                keys[e.code] = true; 
                handleTrickInput(e.code);
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });
            window.addEventListener('resize', onWindowResize);

            checkTouchDevice();
            animate();
        }

        function createSky() {
            const skyGeo = new THREE.SphereGeometry(500, 32, 15);
            const skyMat = new THREE.MeshBasicMaterial({
                color: 0x1c172e,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);
        }

        // --- ДЕТАЛИЗИРОВАННЫЙ САМОКАТ И РАЙДЕР ---
        function buildProScooter() {
            player = new THREE.Group();
            scooter = new THREE.Group();
            player.add(scooter);

            // Материалы
            const chromeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 0.8 });
            const blackGripMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.9 });
            const woodRiderMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6 });
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x004433 });
            const polyUrMat = new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.3 });

            // 1. Дека (Платформа с шероховатой шкуркой)
            const deckBaseGeo = new THREE.BoxGeometry(0.24, 0.05, 1.1);
            deck = new THREE.Mesh(deckBaseGeo, chromeMat);
            deck.position.set(0, 0.05, -0.15);
            deck.castShadow = true;
            scooter.add(deck);

            const griptapeGeo = new THREE.BoxGeometry(0.22, 0.01, 0.95);
            const griptape = new THREE.Mesh(griptapeGeo, blackGripMat);
            griptape.position.set(0, 0.031, 0);
            deck.add(griptape);

            // Шея деки (Труба ко скосу руля)
            const neckGeo = new THREE.BoxGeometry(0.08, 0.25, 0.2);
            const neck = new THREE.Mesh(neckGeo, chromeMat);
            neck.position.set(0, 0.15, 0.45);
            neck.rotation.x = 0.4;
            deck.add(neck);

            // 2. Рулевая система (Вынос, Clamp, Т-образный руль)
            handlebars = new THREE.Group();
            handlebars.position.set(0, 0.05, 0.42); 
            scooter.add(handlebars);

            // Хомут (Clamp)
            const clampGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.1, 12);
            const clamp = new THREE.Mesh(clampGeo, neonMat);
            clamp.position.y = 0.25;
            handlebars.add(clamp);

            // Рулевой шток (SCS руль)
            const barTubeGeo = new THREE.CylinderGeometry(0.028, 0.028, 0.95, 12);
            const barTube = new THREE.Mesh(barTubeGeo, blackGripMat);
            barTube.position.set(0, 0.65, 0);
            handlebars.add(barTube);

            // Кроссбар (Перекладина руля)
            const crossbarGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.62, 12);
            crossbarGeo.rotateZ(Math.PI / 2);
            const crossbar = new THREE.Mesh(crossbarGeo, blackGripMat);
            crossbar.position.set(0, 1.1, 0);
            crossbar.castShadow = true;
            handlebars.add(crossbar);

            // Грипсы (Ручки)
            const gripGeo = new THREE.CylinderGeometry(0.032, 0.032, 0.16, 12);
            gripGeo.rotateZ(Math.PI / 2);
            const leftGrip = new THREE.Mesh(gripGeo, neonMat);
            leftGrip.position.set(-0.23, 1.1, 0);
            handlebars.add(leftGrip);
            const rightGrip = leftGrip.clone();
            rightGrip.position.x = 0.23;
            handlebars.add(rightGrip);

            // 3. Колеса (Колёсные диски и гелик)
            const coreGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.07, 12);
            coreGeo.rotateZ(Math.PI / 2);
            const puGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.06, 16);
            puGeo.rotateZ(Math.PI / 2);

            // Переднее
            const fWheelGroup = new THREE.Group();
            const fCore = new THREE.Mesh(coreGeo, chromeMat);
            const fPu = new THREE.Mesh(puGeo, polyUrMat);
            fWheelGroup.add(fCore, fPu);
            fWheelGroup.position.set(0, -0.05, 0.05);
            handlebars.add(fWheelGroup);
            wheels.push(fWheelGroup);

            // Заднее
            const bWheelGroup = new THREE.Group();
            const bCore = new THREE.Mesh(coreGeo, chromeMat);
            const bPu = new THREE.Mesh(puGeo, polyUrMat);
            bWheelGroup.add(bCore, bPu);
            bWheelGroup.position.set(0, 0, -0.65);
            scooter.add(bWheelGroup);
            wheels.push(bWheelGroup);

            // 4. Стилизованный Райдер
            const riderGroup = new THREE.Group();
            riderGroup.position.set(0, 0.08, -0.1);
            player.add(riderGroup);

            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x252535, roughness: 0.7 });
            const hoodieMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            const torsoGeo = new THREE.BoxGeometry(0.3, 0.45, 0.18);
            const torso = new THREE.Mesh(torsoGeo, hoodieMat);
            torso.position.y = 0.45;
            riderGroup.add(torso);

            const headGeo = new THREE.SphereGeometry(0.13, 16, 16);
            const head = new THREE.Mesh(headGeo, woodRiderMat);
            head.position.y = 0.75;
            riderGroup.add(head);

            const capGeo = new THREE.BoxGeometry(0.16, 0.06, 0.22);
            const cap = new THREE.Mesh(capGeo, neonMat);
            cap.position.set(0, 0.82, 0.03);
            riderGroup.add(cap);

            const legGeo = new THREE.BoxGeometry(0.09, 0.38, 0.1);
            const leftLeg = new THREE.Mesh(legGeo, pantsMat);
            leftLeg.position.set(-0.08, 0.19, 0);
            riderGroup.add(leftLeg);
            physics.leftLeg = leftLeg;

            const rightLeg = new THREE.Mesh(legGeo, pantsMat);
            rightLeg.position.set(0.08, 0.19, 0.05); // Стойка слегка боком
            riderGroup.add(rightLeg);
            physics.rightLeg = rightLeg;

            scene.add(player);
        }

        // --- СТРОИТЕЛЬСТВО ДЕРЕВЯННОГО СКЕЙТПАРКА ---
        function generateSegment() {
            let type = 'straight';
            if (nextSegmentZ < -35) {
                let r = Math.random();
                if (r < 0.4) type = 'ramp';      // Полноценная деревянная разгонка
                else if (r < 0.7) type = 'box';  // Стрит-фанбокс с гранями
            }

            const segGroup = new THREE.Group();
            segGroup.userData = { type: type, zStart: nextSegmentZ, zEnd: nextSegmentZ - segmentWidth };

            // Текстурные цвета дерева фанеры
            const woodPlankMat = new THREE.MeshStandardMaterial({ color: 0xbc8f5f, roughness: 0.5 }); 
            const woodStructureMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.8 });
            const ironCopingMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.7, roughness: 0.2 });

            // Пол скейтпарка (Основание)
            const floorGeo = new THREE.BoxGeometry(10, 0.4, segmentWidth);
            const floor = new THREE.Mesh(floorGeo, woodPlankMat);
            floor.position.set(0, -0.2, nextSegmentZ - segmentWidth / 2);
            floor.receiveShadow = true;
            segGroup.add(floor);

            // Граффити-стены парка по бокам
            const wallGeo = new THREE.BoxGeometry(0.4, 3, segmentWidth);
            const wallLeft = new THREE.Mesh(wallGeo, woodStructureMat);
            wallLeft.position.set(-5.2, 1.3, nextSegmentZ - segmentWidth / 2);
            const wallRight = wallLeft.clone();
            wallRight.position.x = 5.2;
            segGroup.add(wallLeft, wallRight);

            if (type === 'ramp') {
                const rLength = 8;
                const rHeight = 2.2;
                
                // Деревянный трамплин (Клин)
                const rampGeo = new THREE.BufferGeometry();
                const w = 5; 
                const vertices = new Float32Array([
                    -w/2, 0, 0,
                     w/2, 0, 0,
                     w/2, rHeight, -rLength,
                    -w/2, rHeight, -rLength,
                    -w/2, 0, -rLength,
                     w/2, 0, -rLength
                ]);
                const indices = [
                    0, 2, 1,  0, 3, 2,
                    4, 1, 5,  4, 0, 1,
                    3, 5, 2,  3, 4, 5,
                    0, 4, 3,  1, 2, 5 
                ];
                rampGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                rampGeo.setIndex(indices);
                rampGeo.computeVertexNormals();

                const ramp = new THREE.Mesh(rampGeo, woodPlankMat);
                ramp.position.set(0, 0, nextSegmentZ - segmentWidth / 2 + rLength / 2);
                ramp.castShadow = true;
                ramp.receiveShadow = true;
                segGroup.add(ramp);

                // Железный коупинг (труба на вершине вылета)
                const copingGeo = new THREE.CylinderGeometry(0.04, 0.04, w, 12);
                copingGeo.rotateZ(Math.PI / 2);
                const coping = new THREE.Mesh(copingGeo, ironCopingMat);
                coping.position.set(0, rHeight, nextSegmentZ - segmentWidth / 2 - rLength / 2);
                segGroup.add(coping);

                segGroup.userData.ramp = {
                    zStart: ramp.position.z,
                    zEnd: ramp.position.z - rLength,
                    height: rHeight,
                    length: rLength
                };
            } 
            else if (type === 'box') {
                // Большой фанбокс для прыжков по центру
                const boxGeo = new THREE.BoxGeometry(4, 0.9, 6);
                const box = new THREE.Mesh(boxGeo, woodPlankMat);
                box.position.set(Math.random() * 1.6 - 0.8, 0.45, nextSegmentZ - segmentWidth / 2);
                box.castShadow = true; box.receiveShadow = true;
                segGroup.add(box);

                // Боковые грани фанеры конструкции
                const supportGeo = new THREE.BoxGeometry(4.2, 0.86, 0.1);
                const support = new THREE.Mesh(supportGeo, woodStructureMat);
                support.position.set(box.position.x, 0.43, box.position.z + 3);
                segGroup.add(support);

                segGroup.userData.box = {
                    xMin: box.position.x - 2.0, xMax: box.position.x + 2.0,
                    zStart: box.position.z + 3.0, zEnd: box.position.z - 3.0,
                    height: 0.9
                };
            }

            scene.add(segGroup);
            segments.push(segGroup);
            nextSegmentZ -= segmentWidth;
        }

        // --- ТАЧ-УПРАВЛЕНИЕ ДЛЯ СМАРТФОНОВ ---
        function setupMobileControls() {
            const joystickZone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            
            let joystickActive = false;
            let startTouchX = 0;

            joystickZone.addEventListener('touchstart', e => {
                joystickActive = true;
                startTouchX = e.touches[0].clientX;
            });

            joystickZone.addEventListener('touchmove', e => {
                if (!joystickActive) return;
                let deltaX = e.touches[0].clientX - startTouchX;
                // Ограничиваем ход стика в пределах 30px
                deltaX = Math.max(-35, Math.min(35, deltaX));
                stick.style.transform = `translateX(${deltaX}px)`;
                
                // Передаем значение в физику
                physics.sideInput = deltaX / 35;
            });

            const endJoystick = () => {
                joystickActive = false;
                stick.style.transform = 'translateX(0px)';
                physics.sideInput = 0;
            };
            joystickZone.addEventListener('touchend', endJoystick);
            joystickZone.addEventListener('touchcancel', endJoystick);

            // Кнопки действий
            const btnJump = document.getElementById('btn-jump');
            btnJump.addEventListener('touchstart', () => {
                if (physics.isGrounded) {
                    physics.isCharging = true;
                }
            });
            btnJump.addEventListener('touchend', () => {
                if (physics.isCharging && physics.isGrounded) {
                    physics.vy = 9 + (physics.jumpCharge * 13);
                    physics.isGrounded = false;
                    physics.isCharging = false;
                    physics.jumpCharge = 0;
                    document.getElementById('charge-bar-container').style.display = 'none';
                    spawnParticles(15, 0x00ffcc);
                }
            });

            document.getElementById('btn-whip').addEventListener('touchstart', () => triggerMobileTrick('tailwhip'));
            document.getElementById('btn-bar').addEventListener('touchstart', () => triggerMobileTrick('barspin'));
            document.getElementById('btn-foot').addEventListener('touchstart', () => triggerMobileTrick('nofooter'));
        }

        function triggerMobileTrick(trickName) {
            if (physics.isGrounded || isGameOver || activeTricks[trickName]) return;
            activeTricks[trickName] = 1;
            if (trickName === 'tailwhip') showTrickText('TAILWHIP', 350);
            if (trickName === 'barspin') showTrickText('BARSPIN', 250);
            if (trickName === 'nofooter') showTrickText('NO FOOTER', 400);
        }

        function handleTrickInput(code) {
            if (physics.isGrounded || isGameOver) return;
            if (code === 'KeyW' && !activeTricks.tailwhip) { activeTricks.tailwhip = 1; showTrickText('TAILWHIP', 350); }
            if (code === 'KeyB' && !activeTricks.barspin) { activeTricks.barspin = 1; showTrickText('BARSPIN', 250); }
            if (code === 'KeyF' && !activeTricks.nofooter) { activeTricks.nofooter = 1; showTrickText('NO FOOTER', 400); }
        }

        function showTrickText(text, pts) {
            const el = document.getElementById('trick-text');
            el.innerText = text; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 600);

            comboTimer = maxComboTime;
            score += Math.floor(pts * combo);
            document.getElementById('score-val').innerText = score;
            
            combo += 0.5;
            document.getElementById('combo-mult').innerText = combo.toFixed(1);
            document.getElementById('combo-ui').style.display = 'block';
        }

        // --- ДВИЖОК ФИЗИКИ И КОЛЛИЗИЙ ---
        function updatePhysics(dt) {
            if (isGameOver) return;

            // Разгон по трассе
            if (physics.vx < physics.maxSpeed) physics.vx += 4.5 * dt;
            physics.z -= physics.vx * dt;
            physics.light.position.set(physics.x, physics.y + 3, physics.z);

            // Колёса крутятся от скорости
            wheels.forEach(w => w.rotation.x -= physics.vx * 0.4 * dt);

            // Обработка руления (Клавиатура + Тач-стик)
            let currentSideMove = 0;
            if (keys['KeyA'] || keys['ArrowLeft']) currentSideMove = -1;
            if (keys['KeyD'] || keys['ArrowRight']) currentSideMove = 1;
            if (physics.sideInput !== 0) currentSideMove = physics.sideInput;

            physics.x += currentSideMove * 8 * dt;
            physics.x = Math.max(-4.5, Math.min(4.5, physics.x));

            // Поворот руля при езде влево-вправо
            if (activeTricks.barspin === 0) {
                handlebars.rotation.y = -currentSideMove * 0.25;
            }

            // Накопление силы прыжка (Пробел на ПК)
            if (keys['Space'] && physics.isGrounded) {
                physics.isCharging = true;
            }

            if (physics.isCharging) {
                physics.jumpCharge = Math.min(1.0, physics.jumpCharge + 2.0 * dt);
                document.getElementById('charge-bar-container').style.display = 'block';
                document.getElementById('charge-progress').style.width = (physics.jumpCharge * 100) + '%';
            }

            if (keys['Space'] === false && physics.isCharging && physics.isGrounded) {
                physics.vy = 9 + (physics.jumpCharge * 13);
                physics.isGrounded = false;
                physics.isCharging = false;
                physics.jumpCharge = 0;
                document.getElementById('charge-bar-container').style.display = 'none';
                spawnParticles(15, 0x00ffcc);
            }

            // Расчет высоты конструкций
            let targetFloorY = 0;
            let currentSeg = null;

            for (let seg of segments) {
                if (physics.z <= seg.userData.zStart && physics.z >= seg.userData.zEnd) {
                    currentSeg = seg; break;
                }
            }

            if (currentSeg) {
                if (currentSeg.userData.type === 'ramp' && currentSeg.userData.ramp) {
                    let r = currentSeg.userData.ramp;
                    if (physics.z <= r.zStart && physics.z >= r.zEnd) {
                        let pct = (r.zStart - physics.z) / (r.zStart - r.zEnd);
                        targetFloorY = pct * r.height;
                        physics.pitch = -0.25; // Наклон корпуса при заезде на рампу
                    }
                } 
                else if (currentSeg.userData.type === 'box' && currentSeg.userData.box) {
                    let b = currentSeg.userData.box;
                    if (physics.z <= b.zStart && physics.z >= b.zEnd && physics.x >= b.xMin && physics.x <= b.xMax) {
                        targetFloorY = b.height;
                    }
                }
            }

            // Поведение в воздухе / на объектах
            if (!physics.isGrounded) {
                physics.vy -= physics.gravity * dt;
                physics.y += physics.vy * dt;

                // Балансировка наклона в воздухе кнопками поворота
                physics.roll += currentSideMove * 2.2 * dt;

                if (physics.y <= targetFloorY) {
                    physics.y = targetFloorY;
                    physics.vy = 0;
                    physics.isGrounded = true;
                    spawnParticles(10, 0xff0055);

                    // Если угол завала больше допустимого — упал
                    if (Math.abs(physics.roll) > 0.45) {
                        endGame();
                    }
                    physics.roll = 0; physics.pitch = 0;
                }
            } else {
                if (physics.y < targetFloorY) physics.y = targetFloorY;
                else if (physics.y > targetFloorY + 0.08) physics.isGrounded = false; // слетел со стола

                if (currentSideMove !== 0) physics.roll = currentSideMove * 0.18;
                else physics.roll = 0;
            }

            player.position.set(physics.x, physics.y, physics.z);
            player.rotation.z = -physics.roll;
            player.rotation.x = physics.pitch;

            // Бесконечное удаление и создание новых зон
            if (segments.length > 0 && segments[0].userData.zStart < physics.z + 40) {
                let old = segments.shift();
                scene.remove(old);
                generateSegment();
            }

            // Множитель комбо
            if (combo > 1) {
                comboTimer -= dt;
                document.getElementById('combo-progress').style.width = (comboTimer / maxComboTime * 100) + '%';
                if (comboTimer <= 0) {
                    combo = 1;
                    document.getElementById('combo-ui').style.display = 'none';
                }
            }
        }

        // --- АНИМАЦИЯ ТРЮКОВЫХ ЭЛЕМЕНТОВ СУПЕР-САМОКАТА ---
        function animateTricks(dt) {
            // 1. Tailwhip (Вращение деки)
            if (activeTricks.tailwhip > 0) {
                activeTricks.tailwhip += 9 * dt;
                deck.rotation.y = activeTricks.tailwhip * Math.PI;
                if (activeTricks.tailwhip >= 3) { 
                    activeTricks.tailwhip = 0; deck.rotation.y = 0;
                }
            }
            // 2. Barspin (Вращение руля)
            if (activeTricks.barspin > 0) {
                activeTricks.barspin += 11 * dt;
                handlebars.rotation.y = activeTricks.barspin * Math.PI;
                if (activeTricks.barspin >= 3) {
                    activeTricks.barspin = 0; handlebars.rotation.y = 0;
                }
            }
            // 3. No Footer (Ноги летят в стороны)
            if (activeTricks.nofooter > 0) {
                activeTricks.nofooter += 6 * dt;
                let phase = Math.sin(activeTricks.nofooter * Math.PI);
                physics.leftLeg.position.x = -0.08 - (phase * 0.45);
                physics.rightLeg.position.x = 0.08 + (phase * 0.45);
                if (activeTricks.nofooter >= 1.5) {
                    activeTricks.nofooter = 0;
                    physics.leftLeg.position.x = -0.08;
                    physics.rightLeg.position.x = 0.08;
                }
            }
        }

        function spawnParticles(count, colorHex) {
            const pGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const pMat = new THREE.MeshBasicMaterial({ color: colorHex });
            for(let i=0; i<count; i++) {
                const m = new THREE.Mesh(pGeo, pMat);
                m.position.set(physics.x, physics.y, physics.z - 0.3);
                scene.add(m);
                particles.push({
                    mesh: m,
                    vx: (Math.random() - 0.5) * 6,
                    vy: Math.random() * 5 + 3,
                    vz: physics.vx * 0.2 + Math.random() * 3,
                    life: 0.8
                });
            }
        }

        function updateParticles(dt) {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.life -= dt * 2.2;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.vy -= 14 * dt;
                if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').classList.add('active');
            if (score > highScore) {
                highScore = score; localStorage.setItem('scoot_street_high', highScore);
                document.getElementById('high-val').innerText = highScore;
                document.getElementById('go-title').innerText = "NEW RECORD!";
            } else {
                document.getElementById('go-title').innerText = "CRASHED!";
            }
        }

        function resetGame() {
            for (let seg of segments) scene.remove(seg);
            segments = []; nextSegmentZ = 0;
            physics.x = 0; physics.y = 0.6; physics.z = 0;
            physics.vx = 18; physics.vy = 0; physics.pitch = 0; physics.roll = 0;
            physics.isGrounded = true; physics.isCharging = false; physics.jumpCharge = 0;
            score = 0; combo = 1;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('combo-ui').style.display = 'none';
            document.getElementById('charge-bar-container').style.display = 'none';
            for (let i = 0; i < visibleSegmentsCount; i++) generateSegment();
            isGameOver = false;
            document.getElementById('game-over-screen').classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ЦИКЛ РЕНДЕРА И СЛЕДОВАНИЯ КАМЕРЫ ---
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            let dt = clock.getDelta();
            if (dt > 0.1) dt = 0.1;

            updatePhysics(dt);
            animateTricks(dt);
            updateParticles(dt);

            if (!isGameOver) {
                // Камера следит сбоку-сзади, плавно покачиваясь
                const targetCamX = physics.x * 0.5 + 1.2; 
                const targetCamY = physics.y + 3.5;
                const targetCamZ = physics.z + 6.0;
                
                camera.position.x += (targetCamX - camera.position.x) * 0.12;
                camera.position.y += (targetCamY - camera.position.y) * 0.12;
                camera.position.z += (targetCamZ - camera.position.z) * 0.12;
                camera.lookAt(new THREE.Vector3(physics.x, physics.y + 0.6, physics.z - 1.5));
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
