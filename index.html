<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vest Scoot: Extreme Street 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0c0b14;
            font-family: 'Permanent Marker', cursive, sans-serif;
            user-select: none; touch-action: none;
            width: 100vw; height: 100vh;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Уличный UI */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        .score-box { font-size: 32px; color: #ffeb3b; text-shadow: 3px 3px 0px #000; }
        .best-box { font-size: 16px; color: #00e676; text-shadow: 1px 1px 0px #000; }
        
        #combo-ui {
            position: absolute; top: 20px; right: 20px; text-align: right;
            color: #ff1744; font-size: 36px; z-index: 10; text-shadow: 3px 3px 0px #000; display: none;
        }
        #combo-bar { width: 130px; height: 10px; background: #20000a; border: 2px solid #ff1744; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #combo-progress { width: 100%; height: 100%; background: #ff1744; }
        
        #charge-container {
            position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 16px; background: #111; border: 3px solid #ffeb3b; border-radius: 8px; overflow: hidden; display: none; z-index: 10;
        }
        #charge-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffeb3b, #ff5722); }
        
        #trick-alert {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 50px; text-shadow: 4px 4px 0px #000, 0 0 30px #00e676;
            opacity: 0; transition: opacity 0.1s; pointer-events: none; z-index: 10; letter-spacing: 2px;
        }

        /* Кнопки для мобилок */
        #mobile-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; display: none; }
        .touch-pad { pointer-events: auto; position: absolute; }
        #steering-pad { bottom: 30px; left: 30px; width: 140px; height: 140px; background: rgba(255,255,255,0.03); border: 3px dashed rgba(0,230,118,0.3); border-radius: 50%; }
        #joystick { width: 55px; height: 55px; background: rgba(0,230,118,0.5); border: 2px solid #00e676; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
        
        #tricks-pad { bottom: 20px; right: 20px; width: 180px; height: 180px; }
        .m-btn {
            color: #fff; font-family: 'Permanent Marker', cursive; border-radius: 50%; position: absolute;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0px #000; font-size: 14px;
        }
        .m-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #000; }
        #m-jump { width: 70px; height: 70px; bottom: 0; right: 0; background: #ffeb3b; color: #000; font-size: 16px; border: 2px solid #000; }
        #m-whip { width: 48px; height: 48px; top: 0; right: 10px; background: #ff1744; border: 1px solid #000; }
        #m-bar { width: 48px; height: 48px; top: 20px; left: 10px; background: #29b6f6; border: 1px solid #000; }
        #m-foot { width: 48px; height: 48px; bottom: 65px; left: 0; background: #ab47bc; border: 1px solid #000; }
        #m-bri { width: 48px; height: 48px; top: 0; left: 70px; background: #ff5722; border: 1px solid #000; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(12, 11, 20, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
        }
        #game-over.active { opacity: 1; pointer-events: auto; }
        h1 { font-size: 60px; color: #ff1744; text-shadow: 4px 4px 0px #000; margin: 0; }
        .restart-btn {
            padding: 15px 40px; font-size: 24px; background: #00e676; color: #000; border: 3px solid #000;
            box-shadow: 5px 5px 0px #ff1744; cursor: pointer; font-family: 'Permanent Marker', cursive; margin-top: 30px;
        }
        .restart-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #ff1744; }
    </style>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div class="score-box">STREET SCORE: <span id="score-val">0</span></div>
        <div class="best-box">PARK RECORD: <span id="high-val">0</span></div>
    </div>

    <div id="combo-ui">
        <div>X<span id="combo-mult">1.0</span></div>
        <div id="combo-bar"><div id="combo-progress"></div></div>
    </div>

    <div id="charge-container"><div id="charge-bar"></div></div>
    <div id="trick-alert">BRI FLIP</div>

    <div id="mobile-ui">
        <div id="steering-pad" class="touch-pad"><div id="joystick"></div></div>
        <div id="tricks-pad" class="touch-pad">
            <div id="m-jump" class="m-btn">OLLIE</div>
            <div id="m-whip" class="m-btn">WHIP</div>
            <div id="m-bar" class="m-btn">BAR</div>
            <div id="m-foot" class="m-btn">FOOT</div>
            <div id="m-bri" class="m-btn">BRI</div>
        </div>
    </div>

    <div id="game-over">
        <h1 id="go-title">WASTED!</h1>
        <p style="font-size: 26px; color: #ffeb3b;">SCORE: <span id="final-score" style="color: #fff;">0</span></p>
        <button class="restart-btn" onclick="resetGame()">RIDE AGAIN</button>
    </div>

    <script>
        // Проверка загрузки внешней либы, если нет сети — используем внутренний фолбэк
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:20%;'>Критическая ошибка: Требуется однократный доступ к сети для кэширования Three.js или используйте браузер с поддержкой WebGL!</h2>";
        }

        let scene, camera, renderer, clock;
        let player, scooter, handlebars, deck, rider, wheels = [];
        let leftLeg, rightLeg;
        let segments = [], particles = [];
        
        const physics = {
            x: 0, y: 0.6, z: 0,
            vx: 18, vy: 0, maxSpeed: 40, gravity: 40,
            isGrounded: true, pitch: 0, roll: 0, yaw: 0,
            jumpCharge: 0, isCharging: false, sideInput: 0,
            isManual: false
        };

        let score = 0, highScore = localStorage.getItem('v_scoot_best') || 0;
        let combo = 1.0, comboTimer = 0, maxComboTime = 2.5;
        let isGameOver = false;

        // Тайминги 3D анимации трюков
        let tricksTime = { whip: 0, bar: 0, foot: 0, bri: 0, superman: 0 };
        const keys = {};

        function checkDevice() {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('mobile-ui').style.display = 'block';
                initMobileControls();
            }
        }

        function init() {
            clock = new THREE.Clock();
            document.getElementById('high-val').innerText = highScore;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0914);
            scene.fog = new THREE.FogExp2(0x0a0914, 0.008);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Освещение ночного скейтпарка
            const ambient = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambient);

            const spot = new THREE.SpotLight(0x00e676, 1.2, 60, Math.PI/4, 0.5, 1);
            spot.position.set(0, 30, 10);
            spot.castShadow = true;
            scene.add(spot);

            const playerLight = new THREE.PointLight(0xff00b0, 1.5, 25);
            scene.add(playerLight);
            physics.pointLight = playerLight;

            // Сборка кастомного 3D самоката
            buildScooterAndRider();

            // Старт уличной трассы
            for(let i=0; i<12; i++) { generateParkSegment(); }

            window.addEventListener('keydown', e => { keys[e.code] = true; handlePCInputs(e); });
            window.addEventListener('keyup', e => { keys[e.code] = false; });
            window.addEventListener('resize', onWindowResize);

            checkDevice();
            animate();
        }

        // --- ЧЕСТНАЯ ИЕРАРХИЧЕСКАЯ МОДЕЛЬ ДЛЯ ВИЗУАЛИЗАЦИИ ТРЮКОВ ---
        function buildScooterAndRider() {
            player = new THREE.Group();
            scooter = new THREE.Group();
            player.add(scooter);

            const metal = new THREE.MeshStandardMaterial({ color: 0x90a4ae, metalness: 0.8, roughness: 0.2 });
            const gripMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const neonGreen = new THREE.MeshStandardMaterial({ color: 0x00e676, emissive: 0x003311 });
            const neonMagenta = new THREE.MeshStandardMaterial({ color: 0xff00b0, emissive: 0x330022 });
            const skin = new THREE.MeshStandardMaterial({ color: 0xffcc80, roughness: 0.6 });

            // Дека
            const deckGeo = new THREE.BoxGeometry(0.26, 0.06, 1.2);
            deck = new THREE.Mesh(deckGeo, metal);
            deck.castShadow = true; deck.position.set(0, 0.05, -0.2);
            scooter.add(deck);

            const tape = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.01, 1.0), gripMat);
            tape.position.y = 0.035; deck.add(tape);

            // Руль (Группа вращения Barspin)
            handlebars = new THREE.Group();
            handlebars.position.set(0, 0.05, 0.45);
            scooter.add(handlebars);

            const T_bar = new THREE.Mesh(new THREE.CylinderGeometry(0.026, 0.026, 1.0), metal);
            T_bar.position.y = 0.5; handlebars.add(T_bar);

            const cross = new THREE.Mesh(new THREE.CylinderGeometry(0.024, 0.024, 0.65), neonMagenta);
            cross.position.y = 1.0; cross.rotation.z = Math.PI/2;
            cross.castShadow = true; handlebars.add(cross);

            // Колеса
            const whGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.07, 12); whGeo.rotateZ(Math.PI/2);
            const whMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
            
            const fWheel = new THREE.Mesh(whGeo, whMat); fWheel.position.set(0, -0.05, 0.05);
            handlebars.add(fWheel); wheels.push(fWheel);

            const bWheel = new THREE.Mesh(whGeo, whMat); bWheel.position.set(0, 0, -0.7);
            scooter.add(bWheel); wheels.push(bWheel);

            // Райдер
            rider = new THREE.Group(); rider.position.set(0, 0.08, -0.1);
            player.add(rider);

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.48, 0.2), gripMat);
            body.position.y = 0.45; body.castShadow = true; rider.add(body);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), skin);
            head.position.y = 0.76; rider.add(head);

            leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.38, 0.09), neonGreen);
            leftLeg.position.set(-0.09, 0.19, 0); rider.add(leftLeg);

            rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.38, 0.09), neonGreen);
            rightLeg.position.set(0.09, 0.19, 0.1); rider.add(rightLeg);

            scene.add(player);
        }

        // --- СТРИТ ОКРУЖЕНИЕ: РАМПЫ, БОРДЮРЫ, ПЕРИЛА ---
        function generateParkSegment() {
            let type = 'straight';
            if (nextSegmentZ < -40) {
                let r = Math.random();
                if (r < 0.35) type = 'ramp';       // Большой деревянный вылет
                else if (r < 0.65) type = 'ledge';     // Бетонный бордюр (стрит-зона)
                else if (r < 0.85) type = 'spine';     // Двойная рампа
            }

            const seg = new THREE.Group();
            seg.userData = { type: type, zStart: nextSegmentZ, zEnd: nextSegmentZ - segmentWidth };

            const concrete = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.8 });
            const wood = new THREE.MeshStandardMaterial({ color: 0xa1887f, roughness: 0.6 });
            const iron = new THREE.MeshStandardMaterial({ color: 0xb0bec5, metalness: 0.8 });

            // Основание асфальта
            const base = new THREE.Mesh(new THREE.BoxGeometry(12, 0.4, segmentWidth), concrete);
            base.position.set(0, -0.2, nextSegmentZ - segmentWidth/2);
            base.receiveShadow = true; seg.add(base);

            // Квотер-стены по краям для ощущения закрытого скейтпарка
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, segmentWidth), concrete);
            leftWall.position.set(-6.2, 1.8, nextSegmentZ - segmentWidth/2);
            seg.add(leftWall);
            const rightWall = leftWall.clone(); rightWall.position.x = 6.2; seg.add(rightWall);

            if (type === 'ramp') {
                // Плавный заезд/трамплин из дерева
                const rBox = new THREE.Mesh(new THREE.BoxGeometry(6, 1.8, 7), wood);
                rBox.position.set(0, 0.5, nextSegmentZ - segmentWidth/2);
                rBox.rotation.x = -0.15; // Склон
                rBox.castShadow = true; rBox.receiveShadow = true;
                seg.add(rBox);

                seg.userData.ramp = { zStart: rBox.position.z + 3.5, zEnd: rBox.position.z - 3.5, height: 1.8 };
            } 
            else if (type === 'ledge') {
                // Бетонный бордюр для скольжений (Слева или Справа)
                const side = Math.random() > 0.5 ? 2.2 : -2.2;
                const ledge = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.8, 10), concrete);
                ledge.position.set(side, 0.4, nextSegmentZ - segmentWidth/2);
                ledge.castShadow = true; ledge.receiveShadow = true;
                seg.add(ledge);

                // Железная грань на бордюре
                const rail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 10), iron);
                rail.position.set(side + (side > 0 ? -1.2 : 1.2), 0.82, nextSegmentZ - segmentWidth/2);
                seg.add(rail);

                seg.userData.ledge = { xMin: side - 1.25, xMax: side + 1.25, zStart: ledge.position.z + 5, zEnd: ledge.position.z - 5, height: 0.8 };
            }

            scene.add(seg);
            segments.push(seg);
            nextSegmentZ -= segmentWidth;
        }

        // --- СИСТЕМА ОБРАБОТКИ ВСЕХ ТРЮКОВ ---
        function handlePCInputs(e) {
            if (isGameOver) return;
            
            // Если на земле — копим Ollie (Прыжок)
            if (e.code === 'Space' && physics.isGrounded) physics.isCharging = true;
            
            // Трюки в воздухе
            if (!physics.isGrounded) {
                if (e.code === 'KeyW' && !tricksTime.whip) { tricksTime.whip = 1; triggerTrickFX('TAILWHIP', 400); }
                if (e.code === 'KeyB' && !tricksTime.bar) { tricksTime.bar = 1; triggerTrickFX('BARSPIN', 300); }
                if (e.code === 'KeyF' && !tricksTime.foot) { tricksTime.foot = 1; triggerTrickFX('NO FOOTER', 450); }
                if (e.code === 'KeyR' && !tricksTime.bri) { tricksTime.bri = 1; triggerTrickFX('BRI FLIP', 800); }
                if (e.code === 'KeyE' && !tricksTime.superman) { tricksTime.superman = 1; triggerTrickFX('SUPERMAN', 600); }
            }
        }

        function triggerTrickFX(name, pts) {
            const el = document.getElementById('trick-alert');
            el.innerText = name; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 500);

            comboTimer = maxComboTime;
            score += Math.floor(pts * combo);
            document.getElementById('score-val').innerText = score;
            combo += 0.5;
            document.getElementById('combo-mult').innerText = combo.toFixed(1);
            document.getElementById('combo-ui').style.display = 'block';
            spawnParticles(12, 0x00e676);
        }

        // --- ДИНАМИЧЕСКИЙ СЛОЙ ФИЗИКИ И КОЛЛИЗИЙ ---
        function updatePhysicsEngine(dt) {
            if (isGameOver) return;

            // Движение по вектору Z вперед
            if (physics.vx < physics.maxSpeed) physics.vx += 5 * dt;
            physics.z -= physics.vx * dt;
            physics.pointLight.position.set(physics.x, physics.y + 2.5, physics.z);

            // Вращение колес в движении
            wheels.forEach(w => w.rotation.x -= physics.vx * 0.35 * dt);

            // Стрелки/Тач управление смещением
            let sideMove = 0;
            if (keys['KeyA'] || keys['ArrowLeft']) sideMove = -1;
            if (keys['KeyD'] || keys['ArrowRight']) sideMove = 1;
            if (physics.sideInput !== 0) sideMove = physics.sideInput;

            physics.x += sideMove * 9 * dt;
            physics.x = Math.max(-5.5, Math.min(5.5, physics.x));

            // Поворот рулевой стойки при рулении
            if (!tricksTime.bar) handlebars.rotation.y = -sideMove * 0.3;

            // Накат Manual (Зажатие вниз на коробке/земле для комбо)
            if ((keys['KeyS'] || keys['ArrowDown']) && physics.isGrounded) {
                physics.isManual = true;
                scooter.rotation.x = -0.25; // Задираем нос
                comboTimer = Math.min(maxComboTime, comboTimer + dt * 0.8); // Держим комбо!
            } else if (physics.isGrounded) {
                physics.isManual = false;
                scooter.rotation.x = 0;
            }

            // Прыжок Ollie
            if (physics.isCharging) {
                physics.jumpCharge = Math.min(1.0, physics.jumpCharge + 2.2 * dt);
                document.getElementById('charge-container').style.display = 'block';
                document.getElementById('charge-bar').style.style = (physics.jumpCharge * 100) + '%';
            }
            if (keys['Space'] === false && physics.isCharging && physics.isGrounded) {
                physics.vy = 10 + (physics.jumpCharge * 14);
                physics.isGrounded = false; physics.isCharging = false; physics.jumpCharge = 0;
                document.getElementById('charge-container').style.display = 'none';
                spawnParticles(15, 0xff00b0);
            }

            // Поиск высоты фигур под колесами
            let floorY = 0;
            let currentSeg = null;
            for(let s of segments) {
                if (physics.z <= s.userData.zStart && physics.z >= s.userData.zEnd) { currentSeg = s; break; }
            }

            if (currentSeg) {
                if (currentSeg.userData.type === 'ramp' && currentSeg.userData.ramp) {
                    let r = currentSeg.userData.ramp;
                    if (physics.z <= r.zStart && physics.z >= r.zEnd) {
                        let pct = (r.zStart - physics.z) / 7; // Длина рампы 7
                        floorY = Math.min(r.height, pct * r.height);
                        physics.pitch = -0.2; // Наклон в гору
                    }
                } 
                else if (currentSeg.userData.type === 'ledge' && currentSeg.userData.ledge) {
                    let l = currentSeg.userData.ledge;
                    if (physics.z <= l.zStart && physics.z >= l.zEnd && physics.x >= l.xMin && physics.x <= l.xMax) {
                        floorY = l.height;
                    }
                }
            }

            // Фаза полета / гравитация
            if (!physics.isGrounded) {
                physics.vy -= physics.gravity * dt;
                physics.y += physics.vy * dt;
                
                // Наклон в воздухе (завал на бок при ошибках)
                physics.roll += sideMove * 2.5 * dt;

                if (physics.y <= floorY) {
                    physics.y = floorY; physics.vy = 0; physics.isGrounded = true;
                    // Проверка критического завала оси при приземлении
                    if (Math.abs(physics.roll) > 0.5) { endGame(); }
                    physics.roll = 0; physics.pitch = 0;
                }
            } else {
                if (physics.y < floorY) physics.y = floorY;
                else if (physics.y > floorY + 0.1) physics.isGrounded = false; // Слетел с бордюра
            }

            // Обновление координат мастер-группы
            player.position.set(physics.x, physics.y, physics.z);
            player.rotation.z = -physics.roll;
            player.rotation.x = physics.pitch;

            // Продвижение стритрейса вперед
            if (segments.length > 0 && segments[0].userData.zStart < physics.z + 30) {
                let old = segments.shift(); scene.remove(old); generateParkSegment();
            }

            // Множитель комбо системы очков
            if (combo > 1.0) {
                comboTimer -= dt;
                document.getElementById('combo-progress').style.width = (comboTimer / maxComboTime * 100) + '%';
                if (comboTimer <= 0) { combo = 1.0; document.getElementById('combo-ui').style.display = 'none'; }
            }
        }

        // --- ВИЗУАЛИЗАЦИЯ И ЧЕСТНАЯ 3D АНИМАЦИЯ ТРЮКОВ В КАДРЕ ---
        function animate3DTricks(dt) {
            // 1. Tailwhip (Прокрутка доски)
            if (tricksTime.whip > 0) {
                tricksTime.whip += 8 * dt;
                deck.rotation.y = tricksTime.whip * Math.PI;
                if (tricksTime.whip >= 3) { tricksTime.whip = 0; deck.rotation.y = 0; }
            }
            // 2. Barspin (Крутим руль на 360)
            if (tricksTime.bar > 0) {
                tricksTime.bar += 10 * dt;
                handlebars.rotation.y = tricksTime.bar * Math.PI;
                if (tricksTime.bar >= 3) { tricksTime.bar = 0; handlebars.rotation.y = 0; }
            }
            // 3. No Footer (Ноги раскидываются в стороны)
            if (tricksTime.foot > 0) {
                tricksTime.foot += 6 * dt;
                let s = Math.sin(tricksTime.foot * Math.PI);
                leftLeg.position.x = -0.09 - s * 0.5;
                rightLeg.position.x = 0.09 + s * 0.5;
                if (tricksTime.foot >= 1.5) { tricksTime.foot = 0; leftLeg.position.x = -0.09; rightLeg.position.x = 0.09; }
            }
            // 4. Bri Flip (Экстремальный переворот всего самоката под углом)
            if (tricksTime.bri > 0) {
                tricksTime.bri += 5 * dt;
                let phase = tricksTime.bri * Math.PI;
                scooter.rotation.z = phase * 2;
                scooter.position.y = Math.sin(phase) * 0.6;
                if (tricksTime.bri >= 1.5) { tricksTime.bri = 0; scooter.rotation.z = 0; scooter.position.y = 0; }
            }
            // 5. Superman (Райдер улетает назад всем телом)
            if (tricksTime.superman > 0) {
                tricksTime.superman += 6 * dt;
                let p = Math.sin(tricksTime.superman * Math.PI);
                rider.position.z = -p * 0.7; rider.position.y = p * 0.3;
                leftLeg.rotation.x = p * 1.2; rightLeg.rotation.x = p * 1.2;
                if (tricksTime.superman >= 1.5) { tricksTime.superman = 0; rider.position.set(0, 0.08, -0.1); leftLeg.rotation.x = 0; rightLeg.rotation.x = 0; }
            }
        }

        // --- МОБИЛЬНЫЙ СЕНСОРНЫЙ СЛОЙ ---
        function initMobileControls() {
            const pad = document.getElementById('steering-pad');
            const stick = document.getElementById('joystick');
            let isMoving = false, startX = 0;

            pad.addEventListener('touchstart', e => { isMoving = true; startX = e.touches[0].clientX; });
            pad.addEventListener('touchmove', e => {
                if (!isMoving) return;
                let dx = e.touches[0].clientX - startX;
                dx = Math.max(-40, Math.min(40, dx));
                stick.style.transform = `translateX(${dx}px)`;
                physics.sideInput = dx / 40;
            });
            const stop = () => { isMoving = false; stick.style.transform = 'none'; physics.sideInput = 0; };
            pad.addEventListener('touchend', stop); pad.addEventListener('touchcancel', stop);

            // Ollie на мобилке
            const jBtn = document.getElementById('m-jump');
            jBtn.addEventListener('touchstart', () => { if (physics.isGrounded) physics.isCharging = true; });
            jBtn.addEventListener('touchend', () => {
                if (physics.isCharging && physics.isGrounded) {
                    physics.vy = 10 + (physics.jumpCharge * 14);
                    physics.isGrounded = false; physics.isCharging = false; physics.jumpCharge = 0;
                    document.getElementById('charge-container').style.display = 'none';
                }
            });

            document.getElementById('m-whip').addEventListener('touchstart', () => triggerMobileTrick('whip', 'TAILWHIP', 400));
            document.getElementById('m-bar').addEventListener('touchstart', () => triggerMobileTrick('bar', 'BARSPIN', 300));
            document.getElementById('m-foot').addEventListener('touchstart', () => triggerMobileTrick('foot', 'NO FOOTER', 450));
            document.getElementById('m-bri').addEventListener('touchstart', () => triggerMobileTrick('bri', 'BRI FLIP', 800));
        }

        function triggerMobileTrick(id, label, pts) {
            if (physics.isGrounded || isGameOver || tricksTime[id]) return;
            tricksTime[id] = 1; triggerTrickFX(label, pts);
        }

        function spawnParticles(count, hex) {
            const pGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
            const pMat = new THREE.MeshBasicMaterial({ color: hex });
            for(let i=0; i<count; i++) {
                const m = new THREE.Mesh(pGeo, pMat); m.position.set(physics.x, physics.y, physics.z - 0.4);
                scene.add(m);
                particles.push({ mesh: m, vx: (Math.random()-0.5)*5, vy: Math.random()*6+2, vz: Math.random()*3, life: 0.7 });
            }
        }

        function updateParticles(dt) {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.life -= dt * 2;
                p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').classList.add('active');
            if (score > highScore) {
                highScore = score; localStorage.setItem('v_scoot_best', highScore);
                document.getElementById('high-val').innerText = highScore;
                document.getElementById('go-title').innerText = "NEW RECORD!";
            }
        }

        function resetGame() {
            for(let s of segments) scene.remove(s);
            segments = []; nextSegmentZ = 0;
            physics.x = 0; physics.y = 0.6; physics.z = 0; physics.vx = 18; physics.vy = 0;
            physics.isGrounded = true; score = 0; combo = 1.0;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over').classList.remove('active');
            for(let i=0; i<12; i++) generateParkSegment();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            let dt = clock.getDelta(); if (dt > 0.1) dt = 0.1;

            updatePhysicsEngine(dt);
            animate3DTricks(dt);
            updateParticles(dt);

            if (!isGameOver) {
                // Динамическое следование камеры от третьего лица (Чуть сбоку для лучшего обзора трюков)
                const tCamX = physics.x * 0.6 + 1.5;
                const tCamY = physics.y + 3.8;
                const tCamZ = physics.z + 6.2;
                
                camera.position.x += (tCamX - camera.position.x) * 0.1;
                camera.position.y += (tCamY - camera.position.y) * 0.1;
                camera.position.z += (tCamZ - camera.position.z) * 0.1;
                camera.lookAt(new THREE.Vector3(physics.x, physics.y + 0.5, physics.z - 2.0));
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
